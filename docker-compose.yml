services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plain_language
      POSTGRES_USER: plain_user
      POSTGRES_PASSWORD: plain_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgresql://plain_user:plain_pass@db:5432/plain_language
      DEBUG: "1"
    volumes:
      - ./backend/app:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pg_data:
