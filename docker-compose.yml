services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plain_language
      POSTGRES_USER: plain_user
      POSTGRES_PASSWORD: plain_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - db_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgresql://plain_user:plain_pass@db:5432/plain_language
      DEBUG: "1"
    volumes:
      - ./backend/app:/app
    depends_on:
      - db
    networks:
      - db_net
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - app_net
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  pg_data:
  letsencrypt_certs:
  certbot_webroot:

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
